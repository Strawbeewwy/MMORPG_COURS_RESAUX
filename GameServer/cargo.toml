[package]
name = "gameserver"
version = "0.1.0"
edition = "2021"

[dependencies]
bevy = "0.18.1"
quinn = "0.11"
tokio = { version = "1", features = ["full"] }
rustls = "0.23"
rcgen = "0.14"
anyhow = "1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
shared = { path = "../Shared" }
uuid = { version = "1", features = ["v4"] }
tracing = "0.1"
tracing-subscriber = "0.3"